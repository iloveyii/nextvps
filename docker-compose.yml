services:
  adminer:
    image: adminer
    container_name: adminer-neon
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: "${POSTGRES_HOST}"
      ADMINER_DEFAULT_DB: "${POSTGRES_DATABASE}"
      ADMINER_DEFAULT_USERNAME: "${POSTGRES_USER}"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  nextjs:
    build: ./nextjs-app
    container_name: nextjs-app
    ports:
      - "3003:3000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  worker:
    build: ./worker
    container_name: order-worker
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      POSTGRES_URL: "${POSTGRES_URL}"
    depends_on:
      - rabbitmq
      - nextjs

volumes:
  adminer_data:
  postgres_data:
